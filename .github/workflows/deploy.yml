name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Debug paths
        run: |
          echo "PWD:"
          pwd
          echo ""
          echo "Repo root files:"
          ls -la
          echo ""
          echo "pubspec.yaml location(s):"
          find . -maxdepth 3 -name pubspec.yaml -print
          echo ""
          echo "Logo location(s):"
          find . -maxdepth 4 -path "*assets/natter-logo-v2.png" -print
          echo ""
          echo "assets folder listing (if present):"
          ls -la assets || true

      - name: Build web
        run: flutter build web --release --base-href "/Natter/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
